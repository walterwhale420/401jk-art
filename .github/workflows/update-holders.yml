name: Update NFT holders and trades

# Refreshes data/holders.json (current on-chain holder) and data/trades.json
# (last Magic Eden secondary sale) for every 401jK NFT. Runs daily; can also be
# triggered manually from the Actions tab. Committing the updated JSON triggers
# Vercel to redeploy automatically.

on:
  schedule:
    - cron: "0 12 * * *" # daily at 12:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-holders
  cancel-in-progress: false

jobs:
  update-holders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh holders
        # Optional: set repo secret SOLANA_RPC_URL to use a private RPC instead
        # of the rate-limited public endpoint.
        env:
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
        run: node scripts/update-holders.mjs

      - name: Refresh trades
        # Last on-chain marketplace sale (Tensor / Magic Eden) per NFT, read
        # from the Solana RPC — no marketplace API key needed. Makes many
        # getTransaction calls, so a private SOLANA_RPC_URL is recommended;
        # falls back to the public endpoint. A transient RPC error must not
        # fail the holder commit.
        continue-on-error: true
        env:
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
        run: node scripts/update-trades.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- data/holders.json data/trades.json; then
            echo "No holder or trade changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/holders.json data/trades.json
          git commit -m "chore: update NFT holders and trades [skip ci]"
          git push
